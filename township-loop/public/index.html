<!doctype html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Township Loop — Laugharne</title>
<meta name="theme-color" content="#1d2b24" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body>
<a class="skip" href="#main">Skip to content</a>

<header class="topbar">
  <button id="homeBtn" class="linklike" aria-label="Trail contents">☰ <span data-i18n="contents">Contents</span></button>
  <span class="brand">The Township Loop</span>
  <span id="netPill" class="pill" title="Connection status">…</span>
</header>

<div id="watermark" class="watermark" hidden>
  PREVIEW — not yet approved for the public. Review each beat, then tick “Approved for site”.
</div>

<main id="main" tabindex="-1">
  <div id="view" aria-live="polite"></div>
</main>

<nav class="pager" id="pager" hidden>
  <button id="prevBtn" class="ghost" data-i18n="back">◀ Back</button>
  <span id="progress" class="progress"></span>
  <button id="nextBtn" class="primary" data-i18n="next">Next ▶</button>
</nav>

<div id="qaLauncher" class="qa-launcher" hidden>
  <button id="qaOpen" class="qa-open" aria-haspopup="dialog" data-i18n="ask">Ask about this place</button>
</div>

<div id="qaPanel" class="qa-panel" role="dialog" aria-modal="true" aria-label="Ask the record" hidden>
  <div class="qa-head">
    <strong data-i18n="askTitle">Ask the record</strong>
    <button id="qaClose" class="linklike" aria-label="Close">✕</button>
  </div>
  <p class="qa-note" data-i18n="askNote">Answers come only from facts we've verified and sourced. If the record is silent, I'll say so.</p>
  <form id="qaForm"><input id="qaInput" type="text" autocomplete="off" placeholder="e.g. Who was the butcher?" aria-label="Your question" /><button class="primary" type="submit" data-i18n="askGo">Ask</button></form>
  <div id="qaAnswer" class="qa-answer" aria-live="polite"></div>
</div>

<footer class="foot">
  <button id="langToggle" class="linklike" aria-label="Language">Cymraeg / English</button>
  <span id="handoff" class="handoff"></span>
</footer>

<script type="module" src="./app.js"></script>
</body>
</html>
